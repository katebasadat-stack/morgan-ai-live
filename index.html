<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORGAN AI V60 ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; font-family: 'Rajdhani', sans-serif; color: #fff; overflow-x: hidden; }
        .glass { background: rgba(10, 10, 10, 0.9); border: 1px solid #222; }
        .neon-text { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-3">
    <div class="max-w-md mx-auto">
        <div class="glass p-4 rounded-xl mb-4 border-b-2 border-cyan-500">
            <div id="balance" class="text-4xl font-['Orbitron'] neon-text mb-2">$0.00</div>
            <div class="grid grid-cols-2 gap-2 mb-3">
                <input id="apiKey" type="password" placeholder="Broker API Key" class="bg-black border border-gray-800 p-2 rounded text-[10px]">
                <input id="accID" type="text" placeholder="Account ID" class="bg-black border border-gray-800 p-2 rounded text-[10px]">
            </div>
            <div class="flex justify-between text-[10px] font-bold uppercase">
                <span class="text-green-400">P/L: <span id="profit">$0.00</span></span>
                <span id="syncStatus" class="pulse text-cyan-500">SCANNING WAVES...</span>
            </div>
        </div>

        <div class="glass p-4 rounded-xl mb-4 space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <select id="mode" class="bg-black border border-gray-700 p-2 rounded text-xs text-cyan-400">
                    <option value="SCALP">HYPER-SCALP</option>
                    <option value="SWING">SWING TRADE</option>
                    <option value="TREND">TREND FOLLOW</option>
                </select>
                <input id="lot" type="number" value="2000" class="bg-black border border-gray-700 p-2 rounded text-xs text-center">
            </div>
            <div class="grid grid-cols-2 gap-2">
                <select id="targetPair" class="bg-black border border-gray-700 p-2 rounded text-xs">
                    <option value="ALL">ALL PAIRS</option>
                    <option value="XAUUSD">GOLD ONLY</option>
                    <option value="EURUSD">EUR/USD ONLY</option>
                </select>
                <select id="exec" class="bg-black border border-gray-700 p-2 rounded text-xs">
                    <option value="AUTO">AUTO-EXECUTE</option>
                    <option value="SIGNAL">SIGNAL ONLY</option>
                </select>
            </div>
            <button onclick="sendCmd('START')" class="w-full py-3 bg-cyan-600 rounded font-bold uppercase text-xs">Activate Engine</button>
            <button onclick="sendCmd('STOP')" class="w-full py-3 bg-red-900 border border-red-500 text-red-500 rounded font-bold uppercase text-xs">🛑 STOP & CLOSE ALL</button>
        </div>

        <div class="glass p-4 rounded-xl mb-4 space-y-2">
            <label class="text-[9px] text-gray-500 uppercase">Remote Code Deployment</label>
            <textarea id="codeUpdate" rows="2" class="w-full bg-black border border-gray-800 p-2 rounded text-[10px] font-mono" placeholder="Paste New Code Here..."></textarea>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="deploy('python')" class="bg-gray-800 py-1 text-[9px] uppercase rounded">Update Engine</button>
                <button onclick="deploy('html')" class="bg-gray-800 py-1 text-[9px] uppercase rounded">Update Dashboard</button>
            </div>
        </div>

        <div id="scanner" class="glass rounded-xl divide-y divide-gray-800"></div>
    </div>

    <script>
        const DB = "https://morgan-ai-v59-default-rtdb.firebaseio.com";
        const PAIRS = ["XAUUSD","EURUSD","GBPUSD","USDJPY","AUDUSD","USDCHF","USDCAD","EURJPY","GBPJPY","AUDJPY","NZDUSD"];

        async function sendCmd(cmd) {
            const data = {
                command: cmd, mode: document.getElementById('mode').value,
                lot: document.getElementById('lot').value, target: document.getElementById('targetPair').value,
                key: document.getElementById('apiKey').value, acc: document.getElementById('accID').value,
                exec: document.getElementById('exec').value, time: Date.now()
            };
            await fetch(`${DB}/control.json`, { method: 'PUT', body: JSON.stringify(data) });
        }

        async function deploy(type) {
            const code = document.getElementById('codeUpdate').value;
            const path = type === 'python' ? 'update' : 'web_update';
            await fetch(`${DB}/${path}.json`, { method: 'PUT', body: JSON.stringify({ code: code, timestamp: Date.now() }) });
            alert(`${type.toUpperCase()} deployed successfully!`);
        }

        setInterval(async () => {
            const res = await fetch(`${DB}/signals.json`);
            const data = await res.json();
            if(!data) return;
            if(data.account) {
                document.getElementById('balance').innerText = `$${data.account.balance}`;
                document.getElementById('profit').innerText = `$${data.account.pl}`;
            }
            let h = "";
            PAIRS.forEach(p => {
                const s = data[p] || {type: "--", entry: "0.00"};
                h += `<div class="p-3 flex justify-between items-center text-xs"><b>${p}</b> <span class="pulse text-cyan-900">〰〰</span> <span>${s.entry}</span> <b class="${s.type == 'BUY' ? 'text-green-500' : 'text-red-500'}">${s.type}</b></div>`;
            });
            document.getElementById('scanner').innerHTML = h;
        }, 2000);
    </script>
</body>
</html>
