<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORGAN AI V60 OMNI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; font-family: 'Rajdhani', sans-serif; color: #fff; }
        .glass { background: rgba(10, 10, 10, 0.98); border: 1px solid #222; box-shadow: 0 0 20px rgba(0, 242, 255, 0.05); }
        .neon-text { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
        .pulse-wave { animation: wave 1.5s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { opacity: 0.2; transform: scaleX(0.8); } 50% { opacity: 1; transform: scaleX(1.2); } }
    </style>
</head>
<body class="p-3">
    <div class="max-w-md mx-auto">
        <div class="glass p-5 rounded-2xl mb-4 border-b-2 border-cyan-500">
            <div class="flex justify-between items-center mb-1">
                <span class="text-[10px] text-cyan-500 font-bold tracking-widest uppercase">Live Broker Sync</span>
                <span class="flex items-center text-[9px] text-green-500 font-bold uppercase"><span class="w-2 h-2 bg-green-500 rounded-full mr-1 animate-ping"></span> Engine Active</span>
            </div>
            <div id="balance" class="text-4xl font-['Orbitron'] neon-text mb-2">$0.00</div>
            
            <div class="flex justify-between text-[11px] font-bold uppercase border-t border-gray-900 pt-3">
                <div class="flex flex-col">
                    <span class="text-gray-500 text-[9px]">ACTIVE LOCK</span>
                    <span id="active-pair" class="text-cyan-400">WAITING...</span>
                </div>
                <div class="flex flex-col items-end text-right">
                    <span class="text-gray-500 text-[9px]">UNREALIZED P/L</span>
                    <span id="profit" class="text-white text-sm font-['Orbitron']">$0.0000</span>
                </div>
            </div>
        </div>

        <div class="glass p-5 rounded-2xl mb-4 space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[9px] text-gray-400 uppercase font-bold mb-1 block">Trading Strategy</label>
                    <select id="mode" class="w-full bg-black border border-gray-800 p-3 rounded-lg text-xs text-cyan-400 font-bold">
                        <option value="SCALPING">⚡ HYPER-SCALPING</option>
                        <option value="DAYTRADING">☀️ DAY TRADING</option>
                        <option value="SWINGING">🌊 SWING TRADING</option>
                        <option value="FLIPING">🔥 ACCOUNT FLIPPING</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] text-gray-400 uppercase font-bold mb-1 block">Lot Size</label>
                    <input id="lot" type="number" step="0.01" value="0.01" class="w-full bg-black border border-gray-800 p-3 rounded-lg text-xs text-center font-bold text-white">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[9px] text-gray-400 uppercase font-bold mb-1 block">Execution Lock (Target)</label>
                    <select id="target" class="w-full bg-black border border-gray-800 p-3 rounded-lg text-xs font-bold text-white">
                        <option value="XAUUSD">GOLD (XAUUSD)</option>
                        <option value="EURUSD">EUR/USD</option>
                        <option value="GBPUSD">GBP/USD</option>
                        <option value="USDJPY">USD/JPY</option>
                        <option value="AUDUSD">AUD/USD</option>
                        <option value="USDCHF">USD/CHF</option>
                        <option value="USDCAD">USD/CAD</option>
                        <option value="EURJPY">EUR/JPY</option>
                        <option value="GBPJPY">GBP/JPY</option>
                        <option value="AUDJPY">AUD/JPY</option>
                        <option value="NZDUSD">NZD/USD</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] text-gray-400 uppercase font-bold mb-1 block">Timeframe</label>
                    <select id="tf" class="w-full bg-black border border-gray-800 p-3 rounded-lg text-xs font-bold text-white">
                        <option value="M1 (SPEED)">1 MIN (SPEED)</option>
                        <option value="M15 (SCALP)">15 MIN (SCALP)</option>
                        <option value="H1 (SWING)">1 HOUR (SWING)</option>
                    </select>
                </div>
            </div>

            <div class="w-full">
                <label class="text-[9px] text-gray-400 uppercase font-bold mb-1 block">Execution Engine</label>
                <select id="exec" class="w-full bg-black border border-gray-800 p-3 rounded-lg text-xs font-bold text-cyan-500">
                    <option value="SIGNAL ONLY">SIGNAL ONLY (SCANNER)</option>
                    <option value="AUTO-EXECUTE (LIVE)">AUTO-EXECUTE (LIVE)</option>
                </select>
            </div>

            <button onclick="sendCmd('START')" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 rounded-xl font-black uppercase text-xs tracking-widest transition shadow-lg shadow-cyan-900/20">Activate Sniper Engine</button>
            <button onclick="sendCmd('STOP')" class="w-full py-3 bg-red-950 hover:bg-red-900 border border-red-800 text-red-100 rounded-xl font-bold uppercase text-[10px] transition">🛑 STOP & CLOSE ALL POSITIONS</button>
        </div>

        <div class="text-[10px] text-gray-600 uppercase font-bold mb-2 ml-1 tracking-widest">Global Intelligence (11 Pairs Active)</div>
        <div id="scanner" class="glass rounded-2xl divide-y divide-gray-900 overflow-hidden">
            </div>
    </div>

    <script>
        const DB = "https://morgan-ai-v59-default-rtdb.firebaseio.com";
        const PAIRS = ["XAUUSD","EURUSD","GBPUSD","USDJPY","AUDUSD","USDCHF","USDCAD","EURJPY","GBPJPY","AUDJPY","NZDUSD"];

        async function sendCmd(cmd) {
            const data = {
                command: cmd, 
                mode: document.getElementById('mode').value,
                lot: document.getElementById('lot').value, 
                target: document.getElementById('target').value,
                tf: document.getElementById('tf').value, 
                exec: document.getElementById('exec').value, 
                timestamp: Date.now()
            };
            await fetch(`${DB}/control.json`, { method: 'PUT', body: JSON.stringify(data) });
            document.getElementById('active-pair').innerText = data.target;
        }

        setInterval(async () => {
            try {
                const res = await fetch(`${DB}/signals.json`);
                const data = await res.json();
                if(!data) return;
                
                // Real-Time Broker Sync
                if(data.account) {
                    document.getElementById('balance').innerText = `$${parseFloat(data.account.balance).toLocaleString()}`;
                    document.getElementById('profit').innerText = `$${parseFloat(data.account.pl).toFixed(4)}`;
                    document.getElementById('profit').className = parseFloat(data.account.pl) >= 0 ? "text-green-400" : "text-red-500";
                }

                // Global Scanner Feed
                let h = "";
                PAIRS.forEach(p => {
                    const s = data[p] || {type: "SCANNING", entry: "0.00"};
                    let color = "text-gray-500";
                    if(s.type === 'BUY') color = "text-green-400";
                    if(s.type === 'SELL') color = "text-red-500";
                    
                    h += `<div class="p-4 flex justify-between items-center text-[11px] font-bold">
                        <span class="w-1/3 text-gray-300">${p}</span>
                        <span class="w-1/3 text-center text-gray-600 font-mono">${s.entry || '0.00'}</span>
                        <span class="w-1/3 text-right uppercase ${color}">${s.type}</span>
                    </div>`;
                });
                document.getElementById('scanner').innerHTML = h;
            } catch (e) { }
        }, 2000);
    </script>
</body>
</html>
