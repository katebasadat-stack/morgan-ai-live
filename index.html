<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORGAN AI V60 SNIPER - ACTIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; font-family: 'Rajdhani', sans-serif; color: #fff; }
        .glass { background: rgba(10, 10, 10, 0.98); border: 1px solid #222; }
        .neon-text { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
        .status-pill { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .stage-active { background: #0e7490; color: #fff; box-shadow: 0 0 10px #0891b2; }
        .input-box { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body class="p-3">
    <div class="max-w-md mx-auto">
        <div class="glass p-5 rounded-2xl mb-4 border-b-2 border-cyan-500">
            <div class="flex justify-between items-center mb-1">
                <span class="text-[10px] text-cyan-500 font-bold uppercase tracking-widest">Master Account</span>
                <span id="engine-status" class="text-[9px] text-green-500 font-bold uppercase animate-pulse">● Live Sync</span>
            </div>
            <div id="balance" class="text-4xl font-['Orbitron'] neon-text mb-2">$0.00</div>
            
            <div class="grid grid-cols-2 gap-2 border-t border-gray-900 pt-3">
                <div class="flex flex-col">
                    <span class="text-gray-500 text-[9px] uppercase">Current Stage</span>
                    <span id="current-stage" class="text-white font-bold text-xs">STAGE 1</span>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-gray-500 text-[9px] uppercase">Next Target</span>
                    <span id="stage-profit" class="text-green-400 font-bold text-xs">$0.25</span>
                </div>
            </div>
        </div>

        <div class="flex justify-between mb-4 px-1">
            <div id="st-1" class="status-pill stage-active">1P</div>
            <div id="st-2" class="status-pill bg-gray-900 text-gray-600">2P</div>
            <div id="st-3" class="status-pill bg-gray-900 text-gray-600">3P</div>
            <div id="st-4" class="status-pill bg-gray-900 text-gray-600">4P</div>
            <div id="st-5" class="status-pill bg-gray-900 text-gray-600">5P</div>
        </div>

        <div class="glass p-5 rounded-2xl mb-4 space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[9px] text-gray-500 uppercase font-bold mb-1 block">Execution Lock</label>
                    <select id="target" class="input-box w-full">
                        <option value="XAUUSD">GOLD (XAUUSD)</option>
                        <option value="EURUSD">EUR/USD</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] text-gray-500 uppercase font-bold mb-1 block">Lot size</label>
                    <input id="lot" type="number" step="0.01" value="0.01" class="input-box w-full text-center">
                </div>
            </div>

            <button onclick="sendCmd('START')" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 rounded-xl font-black uppercase text-xs tracking-widest transition">Activate Sniper Engine</button>
            <button onclick="sendCmd('STOP')" class="w-full py-3 bg-red-950 border border-red-800 text-red-100 rounded-xl font-bold uppercase text-[10px] transition">🛑 STOP & CLOSE ALL</button>
        </div>

        <div id="scanner" class="glass rounded-2xl divide-y divide-gray-900 overflow-hidden"></div>
    </div>

<script>
// --- CORE CONFIG ---
const DB = "https://morgan-ai-v59-default-rtdb.firebaseio.com";
const API_KEY = "20aa58cb4f4b8603412428a22432067a-b9516ca5f54e600ccea8da3b3a50f2cb";
const ACC_ID = "101-004-39063355-001";

let currentStage = 1;
let lastAction = 0;
let trades = [];

// ⚡ ULTRA-FAST ENGINE LOOP (180ms)
setInterval(runEngine, 180);

async function runEngine(){
    try {
        const res = await fetch(DB + "/signals.json");
        const data = await res.json();
        if(!data) return;

        // UI Balance Sync
        if(data.account){
            document.getElementById("balance").innerText = "$" + parseFloat(data.account.balance || 0).toLocaleString();
            updateStageLogic(parseFloat(data.account.pl || 0));
        }

        trades = data.trades || [];
        
        // TikTok Style Auto-Profit Closing
        processAutoExit();
        renderScanner(data);
    } catch(e) {}
}

function processAutoExit(){
    if(!trades.length || (Date.now() - lastAction < 250)) return;

    // Get the most profitable trade
    trades.sort((a,b) => b.profit - a.profit);
    let topTrade = trades[0];
    let target = getStageTarget();

    // Close if target hit or momentum profit (>0.15)
    if(topTrade.profit >= target || topTrade.profit > 0.15){
        executeClose(topTrade.id);
        lastAction = Date.now();
    }
}

function getStageTarget(){
    const targets = {1: 0.25, 2: 0.40, 3: 0.80, 4: 1.50, 5: 3.00};
    return targets[currentStage] || 0.25;
}

async function executeClose(tradeId){
    await fetch(DB + "/close.json", {
        method: "POST",
        body: JSON.stringify({ trade_id: tradeId, action: "CLOSE", time: Date.now() })
    });
}

function updateStageLogic(pl) {
    if(pl >= 0.5) currentStage = 2;
    if(pl >= 1.0) currentStage = 3;
    if(pl >= 2.0) currentStage = 4;
    if(pl >= 4.0) currentStage = 5;

    document.getElementById("current-stage").innerText = "STAGE " + currentStage;
    document.getElementById("stage-profit").innerText = "$" + getStageTarget().toFixed(2);

    for(let i=1; i<=5; i++){
        document.getElementById("st-"+i).className = "status-pill " + (i == currentStage ? "stage-active" : "bg-gray-900 text-gray-600");
    }
}

function renderScanner(data){
    const PAIRS = ["XAUUSD","EURUSD","GBPUSD","USDJPY"];
    let html = "";
    PAIRS.forEach(p => {
        let s = data[p] || {type:"SCAN"};
        let color = s.type == "BUY" ? "text-green-400" : s.type == "SELL" ? "text-red-500" : "text-gray-600";
        html += `<div class="p-3 flex justify-between text-[11px] font-bold">
            <span class="text-gray-300">${p}</span>
            <span class="${color}">${s.type}</span>
        </div>`;
    });
    document.getElementById("scanner").innerHTML = html;
}

async function sendCmd(cmd) {
    await fetch(DB + "/control.json", {
        method: "PUT",
        body: JSON.stringify({
            command: cmd,
            target: document.getElementById('target').value,
            lot: document.getElementById('lot').value,
            api_key: API_KEY,
            acc_id: ACC_ID,
            stage: currentStage,
            timestamp: Date.now()
        })
    });
}
</script>
</body>
</html>
