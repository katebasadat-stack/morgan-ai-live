<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORGAN AI V59 MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; font-family: 'Rajdhani', sans-serif; color: #e2e8f0; }
        .neon-text { text-shadow: 0 0 10px #00ffaa; }
        .glass-panel { background: rgba(15, 15, 15, 0.8); border: 1px solid #1f2937; backdrop-filter: blur(10px); }
        .btn-glow:active { transform: scale(0.98); box-shadow: 0 0 20px #00ffaa; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-bold font-['Orbitron'] tracking-tighter">MORGAN <span class="text-orange-500">AI</span></h1>
            <span class="text-[10px] border border-cyan-500/50 text-cyan-400 px-2 py-1 rounded">V59 MASTER</span>
        </header>

        <div class="glass-panel rounded-xl p-6 mb-6">
            <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2">Select Instrument</label>
            <select id="assetSelect" class="w-full bg-black border border-gray-800 p-3 rounded-lg text-sm focus:outline-none focus:border-cyan-500 mb-6">
                <option value="XAUUSD">GOLD (XAU/USD)</option>
                <option value="EURUSD">EUR/USD</option>
                <option value="GBPUSD">GBP/USD</option>
                <option value="USDJPY">USD/JPY</option>
            </select>

            <button onclick="runAiScan()" class="w-full py-4 bg-transparent border-2 border-cyan-500 text-cyan-400 font-bold rounded-lg flex items-center justify-center gap-2 btn-glow hover:bg-cyan-500/10 transition-all uppercase tracking-widest">
                ⚡ Activate AI Scan
            </button>
        </div>

        <div id="statusBox" class="hidden glass-panel border-red-900/50 p-4 rounded-lg text-center mb-6">
            <p class="text-red-500 text-xs font-bold tracking-widest uppercase">⚠️ Engine Offline</p>
            <p class="text-[10px] text-red-400/70 mt-1">Start morgan_engine.py in Termux</p>
        </div>

        <div id="signalDisplay" class="hidden space-y-4">
            </div>
    </div>

    <script>
        const FIREBASE_URL = "https://morgan-ai-v59-default-rtdb.firebaseio.com/signals.json";

        async function runAiScan() {
            const asset = document.getElementById('assetSelect').value;
            const statusBox = document.getElementById('statusBox');
            const display = document.getElementById('signalDisplay');
            
            try {
                const response = await fetch(FIREBASE_URL);
                const data = await response.json();
                
                if (!data || !data[asset]) {
                    statusBox.classList.remove('hidden');
                    display.classList.add('hidden');
                    return;
                }

                statusBox.classList.add('hidden');
                display.classList.remove('hidden');
                const signal = data[asset];

                display.innerHTML = `
                    <div class="glass-panel p-4 rounded-lg border-l-4 ${signal.type === 'BUY' ? 'border-l-green-500' : 'border-l-red-500'}">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xl font-bold">${signal.type} @ ${signal.entry}</span>
                            <span class="text-xs text-gray-500">${signal.time}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <div class="text-green-400">TP: ${signal.tp}</div>
                            <div class="text-red-400">SL: ${signal.sl}</div>
                        </div>
                    </div>
                `;
            } catch (e) {
                statusBox.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
