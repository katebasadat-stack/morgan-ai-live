<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORGAN AI V60 - AUTO-EXIT ENABLED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; font-family: 'Rajdhani', sans-serif; color: #fff; }
        .glass { background: rgba(12, 12, 12, 0.95); border: 1px solid #333; }
        .neon-border { border-bottom: 2px solid #00f2ff; box-shadow: 0 4px 15px rgba(0, 242, 255, 0.2); }
        .active-stage { background: #0891b2; color: white; box-shadow: 0 0 10px #0891b2; }
    </style>
</head>
<body class="p-3">
    <div class="max-w-md mx-auto">
        <div class="glass p-5 rounded-2xl mb-4 neon-border">
            <div class="flex justify-between items-center mb-1">
                <span class="text-[10px] text-cyan-400 font-bold uppercase tracking-widest">Broker Live Link</span>
                <span id="sync-status" class="text-[9px] text-green-500 font-bold uppercase">● Syncing Positions</span>
            </div>
            <div id="balance" class="text-4xl font-['Orbitron'] text-cyan-400 mb-2">$0.00</div>
            
            <div class="flex justify-between border-t border-gray-800 pt-3">
                <div class="flex flex-col">
                    <span class="text-gray-500 text-[9px] uppercase">Active Target</span>
                    <span id="target-display" class="text-white font-bold text-sm">NOT SET</span>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-gray-500 text-[9px] uppercase">Floating P/L</span>
                    <span id="pl-display" class="font-['Orbitron'] text-sm">$0.00</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-5 gap-1 mb-4">
            <div id="s1" class="text-center text-[10px] py-1 rounded bg-gray-900 text-gray-600 font-bold border border-gray-800">S1</div>
            <div id="s2" class="text-center text-[10px] py-1 rounded bg-gray-900 text-gray-600 font-bold border border-gray-800">S2</div>
            <div id="s3" class="text-center text-[10px] py-1 rounded bg-gray-900 text-gray-600 font-bold border border-gray-800">S3</div>
            <div id="s4" class="text-center text-[10px] py-1 rounded bg-gray-900 text-gray-600 font-bold border border-gray-800">S4</div>
            <div id="s5" class="text-center text-[10px] py-1 rounded bg-gray-900 text-gray-600 font-bold border border-gray-800">S5</div>
        </div>

        <div class="glass p-5 rounded-2xl mb-4 space-y-4">
            <div>
                <label class="text-[9px] text-gray-500 uppercase font-bold mb-1 block">Execution Lock (Pair)</label>
                <select id="lock-pair" class="w-full bg-black border border-gray-800 p-3 rounded-lg text-xs font-bold text-white">
                    <option value="XAUUSD">GOLD (XAUUSD)</option>
                    <option value="EURUSD">EUR/USD</option>
                    <option value="GBPUSD">GBP/USD</option>
                </select>
            </div>

            <button onclick="activateEngine()" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 rounded-xl font-black uppercase text-xs tracking-widest transition">Start Auto-Exit Scaler</button>
            <button onclick="emergencyStop()" class="w-full py-3 bg-red-950 text-red-200 border border-red-800 rounded-xl font-bold uppercase text-[10px]">🛑 Force Close All</button>
        </div>

        <div id="scanner-feed" class="glass rounded-2xl divide-y divide-gray-900 overflow-hidden text-[11px]">
            </div>
    </div>

    <script>
        const DB_URL = "https://morgan-ai-v59-default-rtdb.firebaseio.com";
        let currentStage = 1;
        const STAGE_CONFIG = {
            1: { pos: 1, target: 0.50 },
            2: { pos: 2, target: 0.80 },
            3: { pos: 3, target: 1.50 },
            4: { pos: 4, target: 2.50 },
            5: { pos: 5, target: 5.00 }
        };

        async function activateEngine() {
            const pair = document.getElementById('lock-pair').value;
            document.getElementById('target-display').innerText = pair;
            updateStageUI();
            await syncControl("START", pair);
        }

        async function emergencyStop() {
            await syncControl("STOP", "NONE");
            currentStage = 1;
            updateStageUI();
        }

        async function syncControl(cmd, pair) {
            const payload = {
                command: cmd,
                target: pair,
                stage: currentStage,
                pos_count: STAGE_CONFIG[currentStage].pos,
                exit_target: STAGE_CONFIG[currentStage].target,
                timestamp: Date.now()
            };
            await fetch(`${DB_URL}/control.json`, { method: 'PUT', body: JSON.stringify(payload) });
        }

        function updateStageUI() {
            for(let i=1; i<=5; i++) {
                const el = document.getElementById(`s${i}`);
                el.className = i === currentStage ? "text-center text-[10px] py-1 rounded active-stage font-bold" : "text-center text-[10px] py-1 rounded bg-gray-900 text-gray-600 font-bold border border-gray-800";
            }
        }

        setInterval(async () => {
            try {
                const res = await fetch(`${DB_URL}/signals.json`);
                const data = await res.json();
                if (!data) return;

                if (data.account) {
                    document.getElementById('balance').innerText = `$${parseFloat(data.account.balance).toLocaleString()}`;
                    const currentPL = parseFloat(data.account.pl);
                    document.getElementById('pl-display').innerText = `$${currentPL.toFixed(2)}`;
                    document.getElementById('pl-display').className = currentPL >= 0 ? "text-green-400 font-['Orbitron'] text-sm" : "text-red-500 font-['Orbitron'] text-sm";

                    // AUTO-EXIT LOGIC: If profit hits the stage target, signal the engine to CLOSE and MOVE UP
                    if (currentPL >= STAGE_CONFIG[currentStage].target) {
                        if (currentStage < 5) {
                            currentStage++;
                            updateStageUI();
                            await syncControl("CLOSE_AND_SCALE", document.getElementById('lock-pair').value);
                        }
                    }
                }
            } catch (e) { console.log("Sync Error"); }
        }, 1000); // Check every 1 second for faster exits
    </script>
</body>
</html>
