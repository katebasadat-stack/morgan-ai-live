<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORGAN AI V60 ULTRA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background:#000; font-family:'Rajdhani',sans-serif; color:#fff; }
        .glass { background:rgba(10,10,10,0.98); border:1px solid #222; border-radius: 24px; }
        .neon-text { color:#00f2ff; text-shadow:0 0 15px #00f2ff; }
        .input-box { background:#000; border:1px solid #333; padding:12px; border-radius:12px; font-size:14px; color:#fff; width:100%; outline:none; }
        .mode-btn { border: 1px solid #333; padding: 8px; border-radius: 10px; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .mode-active { background: #0891b2; border-color: #00f2ff; color: #fff; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto space-y-4">
        
        <div class="glass p-6 border-b-2 border-cyan-500">
            <div class="flex justify-between items-center mb-4">
                <span class="text-cyan-500 text-[10px] font-bold tracking-widest uppercase">AI Engine Status</span>
                <span id="ai-brain" class="text-green-500 text-[10px] animate-pulse">THINKING...</span>
            </div>
            <div id="balance" class="text-4xl font-['Orbitron'] neon-text">$0.00</div>
            <div class="flex justify-between mt-4 bg-zinc-900/50 p-3 rounded-xl">
                <div>
                    <p class="text-[9px] text-gray-500 uppercase">Live Profit/Loss</p>
                    <span id="live-pl" class="text-lg font-bold text-white">$0.00</span>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-gray-500 uppercase">Current Mode</p>
                    <span id="active-mode-display" class="text-lg font-bold text-cyan-400">SCALPING</span>
                </div>
            </div>
        </div>

        <div class="glass p-6 space-y-4">
            <div class="grid grid-cols-3 gap-2">
                <div onclick="setMode('SCALPING')" id="mode-scalp" class="mode-btn mode-active text-center">SCALPING</div>
                <div onclick="setMode('SWINGING')" id="mode-swing" class="mode-btn text-center">SWINGING</div>
                <div onclick="setMode('FLIPPING')" id="mode-flip" class="mode-btn text-center">FLIPPING</div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] text-gray-500 font-bold uppercase">Asset Selection</label>
                <select id="pair-select" class="input-box" onchange="toggleCustom()">
                    <option value="frxEURUSD">EUR/USD</option>
                    <option value="R_100">Volatility 100</option>
                    <option value="CUSTOM">-- Add Custom Pair --</option>
                </select>
                <input id="custom-pair" type="text" placeholder="Enter Pair Code (e.g. XAUUSD)" class="input-box hidden">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] text-gray-500 uppercase">Auto TP ($)</label>
                    <input id="tp-val" type="number" value="0.25" class="input-box">
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 uppercase">Auto SL ($)</label>
                    <input id="sl-val" type="number" value="1.00" class="input-box">
                </div>
            </div>

            <button onclick="activateSniper()" class="w-full py-4 bg-cyan-600 rounded-2xl font-black text-xs tracking-widest shadow-lg shadow-cyan-900/40">
                ACTIVATE AI SCANNER
            </button>
        </div>

        <div class="glass p-4 h-32 overflow-y-auto text-[10px] font-mono text-cyan-700" id="scanner-feed">
            > Initializing AI Scanning Layers...<br>
            > Accessing Live Web Sentiment...<br>
        </div>
    </div>

    <script>
        const DB = "https://morgan-ai-v59-default-rtdb.firebaseio.com";
        let currentMode = "SCALPING";

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('mode-active'));
            document.getElementById(`mode-${mode.toLowerCase().substring(0,5)}`).classList.add('mode-active');
            document.getElementById('active-mode-display').innerText = mode;
        }

        function toggleCustom() {
            const select = document.getElementById('pair-select');
            const custom = document.getElementById('custom-pair');
            custom.classList.toggle('hidden', select.value !== 'CUSTOM');
        }

        async function activateSniper() {
            const pair = document.getElementById('pair-select').value === 'CUSTOM' ? 
                         document.getElementById('custom-pair').value : 
                         document.getElementById('pair-select').value;
            
            const payload = {
                command: "START",
                pair: pair,
                mode: currentMode,
                tp: document.getElementById('tp-val').value,
                sl: document.getElementById('sl-val').value,
                time: Date.now()
            };

            await fetch(`${DB}/control.json`, { method: "PUT", body: JSON.stringify(payload) });
            logScanner(`AI Snipe triggered on ${pair} (${currentMode})`);
        }

        function logScanner(msg) {
            const feed = document.getElementById('scanner-feed');
            feed.innerHTML += `> ${msg}<br>`;
            feed.scrollTop = feed.scrollHeight;
        }

        // Real-time Sync for P/L and Balance
        setInterval(async () => {
            const res = await fetch(`${DB}/signals.json`).then(r => r.json());
            if(res && res.account) {
                document.getElementById('balance').innerText = `$${res.account.balance}`;
                const pl = parseFloat(res.account.pl);
                const plDisplay = document.getElementById('live-pl');
                plDisplay.innerText = `$${pl.toFixed(2)}`;
                plDisplay.className = pl >= 0 ? "text-green-500 font-bold" : "text-red-500 font-bold";
            }
        }, 1000);
    </script>
</body>
</html>
