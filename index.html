<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MORGAN AI V60 SNIPER</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
body { background: #000; font-family: 'Rajdhani', sans-serif; color: #fff; }
.glass { background: rgba(10, 10, 10, 0.98); border: 1px solid #222; }
.neon-text { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
.status-pill { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: bold; }
.stage-active { background: #0e7490; color: #fff; box-shadow: 0 0 10px #0891b2; }
</style>
</head>

<body class="p-3">
<div class="max-w-md mx-auto">

<!-- ACCOUNT -->
<div class="glass p-5 rounded-2xl mb-4 border-b-2 border-cyan-500">
<div class="flex justify-between items-center mb-1">
<span class="text-[10px] text-cyan-500 font-bold uppercase">Master Account</span>
<span id="engine-status" class="text-[9px] text-green-500 animate-pulse">● Engine Active</span>
</div>

<div id="balance" class="text-4xl font-['Orbitron'] neon-text mb-2">$0.00</div>

<div class="grid grid-cols-2 gap-2 border-t border-gray-900 pt-3">
<div>
<span class="text-gray-500 text-[9px] uppercase">Current Stage</span>
<span id="current-stage" class="text-white font-bold text-xs">STAGE 1</span>
</div>
<div class="text-right">
<span class="text-gray-500 text-[9px] uppercase">Target</span>
<span id="stage-profit" class="text-green-400 font-bold text-xs">$0.25</span>
</div>
</div>
</div>

<!-- STAGES -->
<div class="flex justify-between mb-4 px-1">
<div id="st-1" class="status-pill stage-active">1P</div>
<div id="st-2" class="status-pill bg-gray-900 text-gray-600">2P</div>
<div id="st-3" class="status-pill bg-gray-900 text-gray-600">3P</div>
<div id="st-4" class="status-pill bg-gray-900 text-gray-600">4P</div>
<div id="st-5" class="status-pill bg-gray-900 text-gray-600">5P</div>
</div>

<!-- CONTROLS -->
<div class="glass p-5 rounded-2xl mb-4 space-y-4">

<select id="target" class="w-full bg-black border border-gray-800 p-3 rounded-lg text-xs font-bold text-white">
<option value="XAUUSD">GOLD</option>
<option value="EURUSD">EURUSD</option>
</select>

<button onclick="sendCmd('START')" class="w-full py-4 bg-cyan-600 rounded-xl font-black text-xs">
ACTIVATE SCALPER
</button>

<button onclick="sendCmd('STOP')" class="w-full py-3 bg-red-900 rounded-xl text-xs">
STOP
</button>

</div>

<!-- SCANNER -->
<div id="scanner" class="glass rounded-2xl divide-y divide-gray-900"></div>

</div>

<script>
const DB = "https://morgan-ai-v59-default-rtdb.firebaseio.com";

let currentStage = 1;
let lastClose = 0;
let trades = [];

// ⚡ ULTRA FAST LOOP
setInterval(runBot, 180);

async function runBot(){
    try{
        const res = await fetch(DB + "/signals.json");
        const data = await res.json();
        if(!data) return;

        // BALANCE
        if(data.account){
            let bal = parseFloat(data.account.balance || 0);
            let pl = parseFloat(data.account.pl || 0);

            document.getElementById("balance").innerText =
                "$" + bal.toLocaleString();

            updateStage(pl);
        }

        // TRADES
        trades = data.trades || [];

        // 🔥 CLOSE PROFITS FAST
        closeEngine();

        // UI scanner
        renderScanner(data);

    }catch(e){}
}

// 🔥 CLOSE ENGINE (MAIN FIX)
function closeEngine(){

    if(!trades.length) return;

    // avoid spam
    if(Date.now() - lastClose < 250) return;

    // sort best first
    trades.sort((a,b)=>b.profit - a.profit);

    let t = trades[0];
    if(!t) return;

    let target = getTarget();

    // CLOSE WINNER
    if(t.profit >= target){
        closeTrade(t.id);
        lastClose = Date.now();
    }

    // PROTECT SMALL PROFITS (tik tok style)
    if(t.profit > 0.15 && t.profit < target){
        closeTrade(t.id);
        lastClose = Date.now();
    }
}

// 🎯 TARGET SYSTEM
function getTarget(){
    if(currentStage==1) return 0.25;
    if(currentStage==2) return 0.40;
    if(currentStage==3) return 0.80;
    if(currentStage==4) return 1.50;
    if(currentStage==5) return 3.00;
    return 0.25;
}

// 🔒 CLOSE TRADE
async function closeTrade(id){
    console.log("Closing:", id);

    await fetch(DB + "/close.json",{
        method:"POST",
        body:JSON.stringify({
            trade_id:id,
            action:"CLOSE",
            time:Date.now()
        })
    });
}

// 📈 STAGE SYSTEM
function updateStage(pl){

    if(pl>=0.5) currentStage=2;
    if(pl>=1) currentStage=3;
    if(pl>=2) currentStage=4;
    if(pl>=4) currentStage=5;

    document.getElementById("current-stage").innerText =
        "STAGE " + currentStage;

    document.getElementById("stage-profit").innerText =
        "$" + getTarget().toFixed(2);

    for(let i=1;i<=5;i++){
        document.getElementById("st-"+i).className =
            "status-pill " + (i==currentStage ? "stage-active":"bg-gray-900 text-gray-600");
    }
}

// 📊 SCANNER UI
function renderScanner(data){
    let pairs = ["XAUUSD","EURUSD","GBPUSD","USDJPY"];
    let html="";

    pairs.forEach(p=>{
        let s = data[p] || {type:"WAIT"};
        let color = s.type=="BUY"?"text-green-400":
                    s.type=="SELL"?"text-red-500":"text-gray-600";

        html += `
        <div class="p-3 flex justify-between text-xs font-bold">
            <span>${p}</span>
            <span class="${color}">${s.type}</span>
        </div>`;
    });

    document.getElementById("scanner").innerHTML = html;
}

// 🎮 COMMANDS
async function sendCmd(cmd){
    await fetch(DB + "/control.json",{
        method:"PUT",
        body:JSON.stringify({
            command:cmd,
            stage:currentStage,
            time:Date.now()
        })
    });
}
</script>

</body>
</html>
