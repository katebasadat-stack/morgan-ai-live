<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORGAN AI V60 SNIPER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; font-family: 'Rajdhani', sans-serif; color: #fff; }
        .glass { background: rgba(10, 10, 10, 0.98); border: 1px solid #222; }
        .neon-text { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
        .status-pill { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .stage-active { background: #0e7490; color: #fff; box-shadow: 0 0 10px #0891b2; }
    </style>
</head>
<body class="p-3">
    <div class="max-w-md mx-auto">
        <div class="glass p-5 rounded-2xl mb-4 border-b-2 border-cyan-500">
            <div class="flex justify-between items-center mb-1">
                <span class="text-[10px] text-cyan-500 font-bold uppercase tracking-widest">Master Account</span>
                <span id="engine-status" class="text-[9px] text-green-500 font-bold uppercase animate-pulse">● Engine Ready</span>
            </div>
            <div id="balance" class="text-4xl font-['Orbitron'] neon-text mb-2">$0.00</div>
            
            <div class="grid grid-cols-2 gap-2 border-t border-gray-900 pt-3">
                <div class="flex flex-col">
                    <span class="text-gray-500 text-[9px] uppercase">Current Stage</span>
                    <span id="current-stage" class="text-white font-bold text-xs">STAGE 1 (1 POS)</span>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-gray-500 text-[9px] uppercase">Stage Target</span>
                    <span id="stage-profit" class="text-green-400 font-bold text-xs">$0.50</span>
                </div>
            </div>
        </div>

        <div class="flex justify-between mb-4 px-1">
            <div id="st-1" class="status-pill stage-active">1P</div>
            <div id="st-2" class="status-pill bg-gray-900 text-gray-600">2P</div>
            <div id="st-3" class="status-pill bg-gray-900 text-gray-600">3P</div>
            <div id="st-4" class="status-pill bg-gray-900 text-gray-600">4P</div>
            <div id="st-5" class="status-pill bg-gray-900 text-gray-600">5P</div>
        </div>

        <div class="glass p-5 rounded-2xl mb-4 space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[9px] text-gray-500 uppercase font-bold mb-1 block">Execution Lock</label>
                    <select id="target" class="w-full bg-black border border-gray-800 p-3 rounded-lg text-xs font-bold text-white">
                        <option value="XAUUSD">GOLD (XAUUSD)</option>
                        <option value="EURUSD">EUR/USD</option>
                        <option value="GBPUSD">GBP/USD</option>
                        <option value="USDJPY">USD/JPY</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] text-gray-500 uppercase font-bold mb-1 block">Auto Lot Increase</label>
                    <select id="autolot" class="w-full bg-black border border-gray-800 p-3 rounded-lg text-xs font-bold text-cyan-500">
                        <option value="YES">ENABLED (DYNAMIC)</option>
                        <option value="NO">DISABLED</option>
                    </select>
                </div>
            </div>

            <button onclick="sendCmd('START')" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 rounded-xl font-black uppercase text-xs tracking-widest shadow-lg shadow-cyan-900/20">Activate High-Speed Scaler</button>
            <button onclick="sendCmd('STOP')" class="w-full py-3 bg-red-950 border border-red-800 text-red-200 rounded-xl font-bold uppercase text-[10px]">🛑 Emergency Stop & Clear</button>
        </div>

        <div id="scanner" class="glass rounded-2xl divide-y divide-gray-900 overflow-hidden">
            </div>
    </div>

    <script>
        const DB = "https://morgan-ai-v59-default-rtdb.firebaseio.com";
        const PAIRS = ["XAUUSD","EURUSD","GBPUSD","USDJPY","AUDUSD","USDCHF","USDCAD","EURJPY","GBPJPY","AUDJPY","NZDUSD"];
        
        let currentStage = 1;

        async function sendCmd(cmd) {
            const data = {
                command: cmd,
                target: document.getElementById('target').value,
                logic: "SEQUENTIAL_SCALER",
                stage: currentStage,
                timestamp: Date.now()
            };
            await fetch(`${DB}/control.json`, { method: 'PUT', body: JSON.stringify(data) });
        }

        setInterval(async () => {
            try {
                const res = await fetch(`${DB}/signals.json`);
                const data = await res.json();
                if(!data) return;

                // Update Account Info
                if(data.account) {
                    document.getElementById('balance').innerText = `$${parseFloat(data.account.balance).toLocaleString()}`;
                    
                    // Logical Stage Calculation based on profit progress
                    const pl = parseFloat(data.account.pl);
                    updateStageLogic(pl);
                }

                // Global Scanner Update
                let h = "";
                PAIRS.forEach(p => {
                    const s = data[p] || {type: "SCANNING", entry: "0.00"};
                    let color = s.type === 'BUY' ? "text-green-400" : (s.type === 'SELL' ? "text-red-500" : "text-gray-600");
                    h += `<div class="p-3 flex justify-between items-center text-[11px] font-bold">
                        <span class="text-gray-300">${p}</span>
                        <span class="${color}">${s.type}</span>
                    </div>`;
                });
                document.getElementById('scanner').innerHTML = h;
            } catch (e) {}
        }, 1500);

        function updateStageLogic(pl) {
            const stages = [
                { id: 1, pos: 1, target: 0.5 },
                { id: 2, pos: 2, target: 0.8 },
                { id: 3, pos: 3, target: 1.5 },
                { id: 4, pos: 4, target: 2.5 },
                { id: 5, pos: 5, target: 5.0 }
            ];

            // Auto-advancing visual logic
            stages.forEach(s => {
                const el = document.getElementById(`st-${s.id}`);
                if (pl >= s.target && currentStage === s.id) {
                    currentStage = s.id + 1;
                }
                el.className = `status-pill ${currentStage === s.id ? 'stage-active' : 'bg-gray-900 text-gray-600'}`;
            });

            const current = stages.find(s => s.id === currentStage) || stages[4];
            document.getElementById('current-stage').innerText = `STAGE ${current.id} (${current.pos} POS)`;
            document.getElementById('stage-profit').innerText = `$${current.target.toFixed(2)}`;
        }
    </script>
</body>
</html>
