<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORGAN AI V60 OMNI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; font-family: 'Rajdhani', sans-serif; color: #fff; }
        .glass { background: rgba(10, 10, 10, 0.95); border: 1px solid #222; }
        .neon-text { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
        .pulse-wave { animation: wave 1.5s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { opacity: 0.2; transform: scaleX(0.8); } 50% { opacity: 1; transform: scaleX(1.2); } }
    </style>
</head>
<body class="p-3">
    <div class="max-w-md mx-auto">
        <div class="glass p-4 rounded-xl mb-4 border-b-2 border-cyan-500">
            <div id="balance" class="text-4xl font-['Orbitron'] neon-text mb-2">$0.00</div>
            <div class="flex justify-between text-[10px] font-bold uppercase">
                <span class="text-green-400">PROFIT: <span id="profit">$0.00</span></span>
                <span class="text-cyan-500 flex items-center">SCANNING <span class="pulse-wave ml-1">〰〰〰</span></span>
            </div>
        </div>

        <div class="glass p-4 rounded-xl mb-4 space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="text-[9px] text-gray-500 uppercase">Trade Mode</label>
                    <select id="mode" class="w-full bg-black border border-gray-700 p-2 rounded text-xs text-cyan-400">
                        <option value="SCALP">HYPER-SCALP</option>
                        <option value="SWING">SWING TRADE</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] text-gray-500 uppercase">Lot Size (Standard)</label>
                    <input id="lot" type="number" step="0.01" value="0.01" class="w-full bg-black border border-gray-700 p-2 rounded text-xs text-center">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="text-[9px] text-gray-500 uppercase">Instrument</label>
                    <select id="target" class="w-full bg-black border border-gray-700 p-2 rounded text-xs">
                        <option value="ALL">ALL 11 PAIRS</option>
                        <option value="XAUUSD">GOLD (XAUUSD)</option>
                        <option value="EURUSD">EURUSD</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] text-gray-500 uppercase">Timeframe</label>
                    <select id="tf" class="w-full bg-black border border-gray-700 p-2 rounded text-xs">
                        <option value="M1 (SPEED)">1 MIN (SCALP)</option>
                        <option value="M15 (SCALP)">15 MIN (TREND)</option>
                        <option value="H1 (SWING)">1 HOUR (SWING)</option>
                    </select>
                </div>
            </div>

            <div class="w-full">
                <label class="text-[9px] text-gray-500 uppercase">Execution</label>
                <select id="exec" class="w-full bg-black border border-gray-700 p-2 rounded text-xs">
                    <option value="SIGNAL ONLY">SIGNAL ONLY (SCANNER)</option>
                    <option value="AUTO-EXECUTE">AUTO-EXECUTE (LIVE)</option>
                </select>
            </div>

            <button onclick="sendCmd('START')" class="w-full py-3 bg-cyan-600 rounded font-bold uppercase text-xs">Activate Engine</button>
            <button onclick="sendCmd('STOP')" class="w-full py-3 bg-red-900 text-white rounded font-bold uppercase text-xs">🛑 STOP & CLOSE ALL</button>
        </div>

        <div id="scanner" class="glass rounded-xl divide-y divide-gray-800">
            </div>
    </div>

    <script>
        const DB = "https://morgan-ai-v59-default-rtdb.firebaseio.com";
        const PAIRS = ["XAUUSD","EURUSD","GBPUSD","USDJPY","AUDUSD","USDCHF","USDCAD","EURJPY","GBPJPY","AUDJPY","NZDUSD"];

        async function sendCmd(cmd) {
            const data = {
                command: cmd, 
                mode: document.getElementById('mode').value,
                lot: document.getElementById('lot').value, 
                target: document.getElementById('target').value,
                tf: document.getElementById('tf').value, 
                exec: document.getElementById('exec').value, 
                time: Date.now()
            };
            await fetch(`${DB}/control.json`, { method: 'PUT', body: JSON.stringify(data) });
        }

        setInterval(async () => {
            const res = await fetch(`${DB}/signals.json`);
            const data = await res.json();
            if(!data) return;
            
            // Update Balance from Python Engine
            if(data.account) {
                document.getElementById('balance').innerText = `$${parseFloat(data.account.balance).toFixed(2)}`;
                document.getElementById('profit').innerText = `$${parseFloat(data.account.pl).toFixed(2)}`;
            }

            // Update Scanner List
            let h = "";
            PAIRS.forEach(p => {
                const s = data[p] || {type: "SCANNING", entry: "0.00"};
                const color = s.type === 'BUY' ? 'text-green-400' : (s.type === 'SELL' ? 'text-red-500' : 'text-gray-500');
                h += `
                <div class="p-3 flex justify-between items-center text-xs">
                    <b class="w-20">${p}</b> 
                    <span class="text-gray-600">${s.entry}</span> 
                    <b class="${color} w-20 text-right">${s.type}</b>
                </div>`;
            });
            document.getElementById('scanner').innerHTML = h;
        }, 3000);
    </script>
</body>
</html>
