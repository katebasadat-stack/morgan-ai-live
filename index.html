<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORGAN AI V60 ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; font-family: 'Rajdhani', sans-serif; color: #fff; }
        .glass { background: rgba(15, 15, 15, 0.95); border: 1px solid #222; }
        .neon-text { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        .neon-border { border-bottom: 2px solid #00f2ff; }
        .btn-stop { background: #400; border: 1px solid #f00; color: #f00; }
    </style>
</head>
<body class="p-3">
    <div class="max-w-md mx-auto">
        <div class="glass p-4 rounded-xl mb-4 neon-border">
            <div class="flex justify-between text-[10px] text-gray-500 mb-1">
                <span>ACCOUNT PRIMARY</span>
                <span id="status" class="text-green-500">● LIVE SCANNING</span>
            </div>
            <div id="balance" class="text-4xl font-['Orbitron'] neon-text">$0.00</div>
            <div class="flex justify-between mt-2 text-xs font-bold">
                <span class="text-green-400">PROFIT: <span id="profit">$0.00</span></span>
                <span class="text-orange-400">MARGIN: <span id="margin">$0.00</span></span>
            </div>
        </div>

        <div class="glass p-4 rounded-xl mb-4 space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="text-[9px] text-gray-500 uppercase">Trade Mode</label>
                    <select id="mode" class="w-full bg-black border border-gray-700 p-2 rounded text-xs text-cyan-400 font-bold">
                        <option value="SCALP">HYPER-SCALP</option>
                        <option value="SWING">SWING TRADE</option>
                        <option value="TREND">TREND FOLLOW</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] text-gray-500 uppercase">Lot Size</label>
                    <input id="lot" type="number" value="2000" class="w-full bg-black border border-gray-700 p-2 rounded text-xs">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <select id="tf" class="bg-black border border-gray-700 p-2 rounded text-xs">
                    <option value="M1">M1 (SPEED)</option>
                    <option value="M15">M15 (NORMAL)</option>
                    <option value="H1">H1 (SAFE)</option>
                </select>
                <select id="exec" class="bg-black border border-gray-700 p-2 rounded text-xs">
                    <option value="AUTO">AUTO-EXECUTE</option>
                    <option value="SIGNAL">SIGNALS ONLY</option>
                </select>
            </div>

            <button onclick="sendCmd('START')" class="w-full py-3 bg-cyan-600 rounded font-bold uppercase text-xs">Activate Engine</button>
            <button onclick="sendCmd('STOP')" class="w-full py-3 btn-stop rounded font-bold uppercase text-xs">🛑 STOP & CLOSE ALL</button>
        </div>

        <div class="glass p-4 rounded-xl mb-4">
            <label class="text-[9px] text-gray-500 uppercase font-bold">Update Engine Logic</label>
            <textarea id="codeUpdate" rows="2" class="w-full bg-black border border-gray-800 p-2 rounded text-[10px] font-mono mt-1" placeholder="Paste new Python code here..."></textarea>
            <button onclick="pushCode()" class="w-full py-1 mt-2 bg-gray-800 text-[9px] uppercase rounded">Deploy New Code</button>
        </div>

        <div id="scanner" class="glass rounded-xl divide-y divide-gray-800"></div>
    </div>

    <script>
        const DB = "https://morgan-ai-v59-default-rtdb.firebaseio.com";
        const PAIRS = ["XAUUSD","EURUSD","GBPUSD","USDJPY","AUDUSD","USDCHF","USDCAD","EURJPY","GBPJPY","AUDJPY","NZDUSD"];

        async function sendCmd(cmd) {
            const data = {
                command: cmd, mode: document.getElementById('mode').value,
                lot: document.getElementById('lot').value, tf: document.getElementById('tf').value,
                exec: document.getElementById('exec').value, time: Date.now()
            };
            await fetch(`${DB}/control.json`, { method: 'PUT', body: JSON.stringify(data) });
        }

        async function pushCode() {
            const code = document.getElementById('codeUpdate').value;
            await fetch(`${DB}/update.json`, { method: 'PUT', body: JSON.stringify({ code: code, timestamp: Date.now() }) });
            alert("New Logic Deployed to Termux!");
        }

        setInterval(async () => {
            const res = await fetch(`${DB}/signals.json`);
            const data = await res.json();
            if(!data) return;
            if(data.account) {
                document.getElementById('balance').innerText = `$${data.account.balance}`;
                document.getElementById('profit').innerText = `$${data.account.pl}`;
                document.getElementById('margin').innerText = `$${data.account.margin}`;
            }
            let h = "";
            PAIRS.forEach(p => {
                const s = data[p] || {type: "--", entry: "0.00"};
                const c = s.type == 'BUY' ? 'text-green-500' : s.type == 'SELL' ? 'text-red-500' : 'text-gray-500';
                h += `<div class="p-3 flex justify-between items-center text-xs"><b>${p}</b> <span>${s.entry}</span> <b class="${c}">${s.type}</b></div>`;
            });
            document.getElementById('scanner').innerHTML = h;
        }, 2000);
    </script>
</body>
</html>
