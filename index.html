<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MORGAN AI V60 SNIPER</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
body { background:#000; font-family:'Rajdhani',sans-serif; color:#fff; }
.glass { background:rgba(10,10,10,0.98); border:1px solid #222; }
.neon-text { color:#00f2ff; text-shadow:0 0 15px #00f2ff; }
.status-pill { padding:2px 8px; border-radius:20px; font-size:10px; font-weight:bold; }
.stage-active { background:#0e7490; box-shadow:0 0 10px #0891b2; }
.input-box { background:#000; border:1px solid #333; padding:10px; border-radius:8px; font-size:12px; color:#fff; outline:none; }
.input-box:focus { border-color: #00f2ff; }
</style>
</head>

<body class="p-3">
<div class="max-w-md mx-auto">

<div class="glass p-5 rounded-2xl mb-4 border-b-2 border-cyan-500">
<div class="flex justify-between items-center mb-1">
<span class="text-cyan-500 text-[10px] font-bold uppercase tracking-widest">Master Account</span>
<span id="engine-status" class="text-green-500 text-[10px] font-bold animate-pulse">● LIVE SYNC</span>
</div>

<div id="balance" class="text-4xl font-['Orbitron'] neon-text mb-2">$0.00</div>

<div class="flex justify-between items-end border-t border-gray-900 pt-3">
    <div>
        <p class="text-[9px] text-gray-500 uppercase">Current Stage</p>
        <span id="current-stage" class="text-white font-bold text-sm">STAGE 1</span>
    </div>
    <div class="text-right">
        <p class="text-[9px] text-gray-500 uppercase">Target P/L</p>
        <span id="stage-profit" class="text-green-400 font-bold text-sm">$0.25</span>
    </div>
</div>
</div>

<div class="glass p-5 rounded-2xl mb-4 space-y-4">

<div class="grid grid-cols-2 gap-3">
    <div>
        <label class="text-[9px] text-gray-500 font-bold uppercase mb-1 block">Execution Pair</label>
        <select id="pair" class="input-box w-full">
            <option value="XAUUSD">GOLD (XAUUSD)</option>
            <option value="EURUSD">EUR/USD</option>
        </select>
    </div>
    <div>
        <label class="text-[9px] text-gray-500 font-bold uppercase mb-1 block">Lot Size</label>
        <input id="lot" type="number" step="0.01" value="0.01" class="input-box w-full text-center">
    </div>
</div>

<button onclick="sendCmd('START')" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 rounded-xl font-black text-xs tracking-widest transition shadow-lg shadow-cyan-900/20">
START SNIPER ENGINE
</button>

<button onclick="sendCmd('STOP')" class="w-full py-3 bg-red-950 border border-red-800 text-red-100 rounded-xl font-bold text-[10px] uppercase transition">
🛑 STOP & CLOSE ALL
</button>

</div>

<div id="scanner" class="glass rounded-2xl divide-y divide-gray-900 overflow-hidden"></div>

</div>

<script>
// --- SECURE CONFIG ---
const DB = "https://morgan-ai-v59-default-rtdb.firebaseio.com";
const API_KEY = "20aa58cb4f4b8603412428a22432067a-b9516ca5f54e600ccea8da3b3a50f2cb";
const ACC_ID = "101-004-39063355-001";

let currentStage = 1;

// ⚡ HIGH-SPEED SYNC (250ms)
setInterval(syncData, 250);

async function syncData(){
    try {
        const res = await fetch(DB + "/signals.json");
        const data = await res.json();
        if(!data) return;

        // Balance Sync
        if(data.account){
            document.getElementById("balance").innerText = "$" + parseFloat(data.account.balance || 0).toLocaleString(undefined, {minimumFractionDigits: 2});
            updateUI(parseFloat(data.account.pl || 0));
        }

        // Scanner Update
        renderScanner(data);
    } catch(e) {}
}

function updateUI(pl) {
    // Stage logic: 1P -> 5P
    if(pl >= 0.50) currentStage = 2;
    if(pl >= 1.00) currentStage = 3;
    if(pl >= 2.00) currentStage = 4;
    if(pl >= 4.00) currentStage = 5;

    const targets = {1: 0.25, 2: 0.40, 3: 0.80, 4: 1.50, 5: 3.00};
    
    document.getElementById("current-stage").innerText = "STAGE " + currentStage;
    document.getElementById("stage-profit").innerText = "$" + (targets[currentStage] || 0.25).toFixed(2);
}

function renderScanner(data) {
    const pairs = ["XAUUSD","EURUSD","GBPUSD","USDJPY"];
    let html = "";
    pairs.forEach(p => {
        let s = data[p] || {type:"WAIT"};
        let color = s.type == "BUY" ? "text-green-400" : s.type == "SELL" ? "text-red-500" : "text-gray-600";
        html += `<div class="p-3 flex justify-between text-[11px] font-bold">
            <span class="text-gray-300">${p}</span>
            <span class="${color}">${s.type}</span>
        </div>`;
    });
    document.getElementById("scanner").innerHTML = html;
}

async function sendCmd(cmd){
    await fetch(DB + "/control.json", {
        method: "PUT",
        body: JSON.stringify({
            command: cmd,
            pair: document.getElementById("pair").value,
            lot: parseFloat(document.getElementById("lot").value),
            api_key: API_KEY,
            acc_id: ACC_ID,
            stage: currentStage,
            time: Date.now()
        })
    });
}
</script>

</body>
</html>
